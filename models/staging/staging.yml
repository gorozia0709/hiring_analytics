version: 2

models:
  - name: stg_candidates
    description: Cleaned historical view of candidate records. Keeps candidate history over time and adds validity fields for version tracking.
    columns:
      - name: _offset
        description: Technical row identifier used to distinguish historical versions.
        tests:
          - not_null

      - name: id
        description: Candidate business identifier.
        tests:
          - not_null

      - name: created_at
        description: Time when the candidate record was first created in the source.
        tests:
          - not_null

      - name: updated_at
        description: Time when this version of the candidate was updated.
        tests:
          - not_null

      - name: row_valid_from
        description: "{{ doc('row_valid_from') }}"
        tests:
          - not_null

      - name: row_valid_to
        description: "{{ doc('row_valid_to') }}"

      - name: row_is_active
        description: Flag showing whether this is the current version of the candidate.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1]

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "row_valid_from <= row_valid_to"

      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["id", "_offset"]

      - one_active_row:
          arguments:
            key_column: id
            active_column: row_is_active

      - valid_to_for_inactive_rows


